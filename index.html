<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlow |Content Creator Registration</title>
</head>
<body>
    <h1>Become a Content Creator</h1>

  <p>
    Join our creator community and share your videos, podcasts,
    tutorials, and creative content with the world.
  </p>

  <form action="/submit-enrollment" method="post">
<fieldset>
    <legend>Creater Registration</legend>
    <div class="form-group">
        <label for="fname">Full Name:</label>
        <input type="text" id="fname" name="fname" required minlength="4" 
        placeholder="e.g. Conrad kipngeno">
    </div>
    <div class="form-group">
        <label for="uemail">Email Address:</label>
        <input type="email" id="uemail" name="uemail" required>
    </div>
    <div class="form-group">
        <label for="password">password</label>
        <input type="password" 
        id="password"
         name="password" 
        placeholder="enter password" 
        required minlength="8">
    </div>
    <div class="form-group">
        <label for="DOB">Date of Birth</label>
        <input type="date" id="DOB" name="DOB" 
         placeholder="Must be 18 and older"
         required min="5-12-2008">
    </div>
    <div class="form-group">
        <label for="Uploadvolume">expected weekly output</label> <br>
        <input type="range" 
         id="Uploadvolume" 
         name="Uploadvolume" 
         min="0" 
         max="10">
    </div>
    <label for="profilePic">Profile Picture:</label><br>
    <input type="file"
     id="profilePic" 
     name="profilePic"
     accept=".jpg, .png">
    </div>
    <div class="form-group">
        <label for="genre">Choose your preferred genre</label> <br>
        <input type="checkbox" 
        id="tech" 
        name="genre" 
        value="tech">
        <label for="tech">tech</label> <br>
        <input type="checkbox" id="food" name="genre" value="food">
        <label for="food">food</label> <br>
        <input type="checkbox" id="music" name="genre" value="music">
        <label for="music">music</label> <br>
        <input type="checkbox" id="others" name="genre" value="others">
        <label for="others">others</label> <br>


    </div>

</fieldset>
    
  </form>
</body>
</html>
