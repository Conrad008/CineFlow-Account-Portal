<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineFlow |Content Creator Registration</title>
</head>
<body>
    <h1>Become a Content Creator</h1>

  <p>
    Join our creator community and share your videos, podcasts,
    tutorials, and creative content with the world.
  </p>

  <form action="/submit-enrollment" method="post">
<fieldset>
    <legend>Creater Registration</legend>
    <div class="form-group">
                        <label for="fname">Full Name:</label>
                        <input type="text" id="fname" name="fname" required minlength="4" 
                        placeholder="e.g. Conrad kipngeno">
    </div>
    
</fieldset>
    
  </form>
</body>
</html>
